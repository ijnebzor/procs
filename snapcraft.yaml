name: procsuf
version: &version v0.1.0
summary: procs unfucked.
description: |
  procsuf is a fork of procs that is finally unfucked.
base: core18
license: MIT

confinement: strict

architectures:
  - build-on: amd64
  - build-on: i386
  - build-on: ppc64el
  - build-on: arm64
  - build-on: armhf

apps:
  procsuf:
    command: procsuf

parts:
  procsuf:
    source: https://github.com/ijnebzor/procsuf.git
    source-tag: *version
    plugin: rust
    stage-packages:
      - libc6
      - libgcc1
      - libstdc++6
      - zlib1g
